<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lawyer Profile | Jusgesto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">⚖ Jusgesto</div>
  <ul>
    <li><a href="/">Home</a></li>
  </ul>
</nav>

<div class="page-container">
  <div class="profile-card">
    <img src="/assets/lawyer.jpg" alt="Lawyer Photo" class="profile-img">

    <h2 id="lawyerName">Lawyer Name</h2>
    <p class="profile-area" id="lawyerArea"></p>

    <div class="profile-info">
      <p><b>City:</b> <span id="lawyerCity"></span></p>
      <p><b>Email:</b> <span id="lawyerEmail"></span></p>
    </div>

    <a href="/" class="back-btn">← Back to Home</a>
  </div>
</div>

<script src="/js/lawyer.js"></script>
</body>
</html>
